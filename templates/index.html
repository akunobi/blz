<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLZ-T</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Noto+Serif+JP:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="orb orb-1" aria-hidden="true"></div>
    <div class="orb orb-2" aria-hidden="true"></div>
    <div class="orb orb-3" aria-hidden="true"></div>

    <div class="app">

        <!-- ═══ TOP NAV ═══ -->
        <nav class="topnav">
            <div class="topnav-brand">
                <div class="brand-orb">
                    <span class="brand-orb-kanji">封</span>
                </div>
                <span class="brand-name">BLZ-T</span>
            </div>

            <!-- Channel pills — horizontal scroll -->
            <div class="channel-pills-wrap">
                <div id="channel-list" class="channel-pills"></div>
            </div>

            <div class="topnav-actions">
                <div class="uptime-chip">
                    <span class="uptime-dot"></span>
                    <span id="chat-uptime" class="uptime-val">00:00</span>
                </div>
                <button class="metrics-pill" onclick="toggleDrawer()">
                    <span class="metrics-pill-icon">◈</span>
                    <span>Metrics</span>
                </button>
            </div>
        </nav>

        <!-- ═══ CHANNEL TITLE BAR ═══ -->
        <div class="channel-bar">
            <div class="channel-bar-inner">
                <span class="channel-bar-hash">#</span>
                <span id="chat-channel-name" class="channel-bar-name">Select a channel</span>
                <span class="channel-bar-sub">作戦室 · Command Relay</span>
            </div>
        </div>

        <!-- ═══ CHAT ═══ -->
        <div id="chat-feed" class="feed">
            <div class="feed-empty">
                <div class="feed-empty-icon">無</div>
                <p class="feed-empty-title">Awaiting signal</p>
                <p class="feed-empty-sub">信号待機中 — Select a channel above</p>
            </div>
        </div>

        <!-- ═══ INPUT ═══ -->
        <div class="composer">
            <div class="composer-inner">
                <input id="msg-input" class="composer-input" type="text"
                       placeholder="Write a message... メッセージを入力"
                       autocomplete="off"/>
                <button id="send-btn" class="composer-send">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                        <path d="M22 2L11 13" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                        <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </div>

    </div><!-- /app -->

    <!-- ═══ METRICS MODAL ═══ -->
    <div class="modal-overlay" id="stats-drawer">
        <div class="modal-backdrop" onclick="toggleDrawer()"></div>
        <div class="modal-card">
            <div class="modal-hdr">
                <div class="modal-hdr-left">
                    <span class="modal-kanji">戦</span>
                    <div>
                        <div class="modal-title">Battle Metrics</div>
                        <div class="modal-subtitle">戦力分析</div>
                    </div>
                </div>
                <button class="modal-close" onclick="toggleDrawer()">✕</button>
            </div>

            <div class="modal-body">
                <div class="metric-group">
                    <div class="mg-head mg-head--atk">
                        <span class="mg-badge">ATK</span>
                        <span>Offensive Stats</span>
                    </div>
                    <div class="mg-fields">
                        <div class="mg-field"><label>SHT</label><input type="number" id="sht" placeholder="0"></div>
                        <div class="mg-field"><label>DBL</label><input type="number" id="dbl" placeholder="0"></div>
                        <div class="mg-field"><label>STL</label><input type="number" id="stl" placeholder="0"></div>
                        <div class="mg-field"><label>PSN</label><input type="number" id="psn" placeholder="0"></div>
                        <div class="mg-field"><label>DFD</label><input type="number" id="dfd" placeholder="0"></div>
                    </div>
                </div>

                <div class="metric-group">
                    <div class="mg-head mg-head--gk">
                        <span class="mg-badge mg-badge--gk">GK</span>
                        <span>Goalkeeper Stats</span>
                    </div>
                    <div class="mg-fields">
                        <div class="mg-field"><label>DVG</label><input type="number" id="dvg" placeholder="—"></div>
                        <div class="mg-field"><label>BIQ</label><input type="number" id="biq" placeholder="—"></div>
                        <div class="mg-field"><label>RFX</label><input type="number" id="rfx" placeholder="—"></div>
                        <div class="mg-field"><label>DTG</label><input type="number" id="dtg" placeholder="—"></div>
                    </div>
                </div>
            </div>

            <button id="ui-stats-btn" class="modal-submit" onclick="generateStats()">
                <span class="modal-submit-kanji">解析</span>
                Generate Stats
            </button>
        </div>
    </div>

    <!-- ═══ STATS MODAL ═══ -->
    <div id="stats-modal" class="stats-overlay">
        <div class="stats-card">
            <div class="stats-hdr">
                <span class="stats-title">Stats Seal <span class="stats-title-jp">封印</span></span>
                <button id="close-modal" class="stats-close">✕</button>
            </div>
            <canvas id="stats-canvas" width="500" height="500"></canvas>
            <div class="stats-actions">
                <button id="copy-stats-btn" class="stats-btn">Copy Image</button>
                <button id="copy-rank-btn" class="stats-btn stats-btn--accent">Copy Rank</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
        function toggleDrawer() {
            document.getElementById('stats-drawer').classList.toggle('active');
        }
    </script>
</body>
</html>
