<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLZ-T</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <!-- Speed lines background -->
    <div class="speed-bg" aria-hidden="true"></div>

    <div class="app">

        <!-- ═══ HEADER ═══ -->
        <header class="hdr">
            <div class="hdr-left">
                <div class="hdr-emblem">
                    <span class="hdr-kanji">無</span>
                </div>
                <div class="hdr-title-wrap">
                    <span class="hdr-title">BLZ-T</span>
                    <span class="hdr-slash">/</span>
                    <span class="hdr-sub">COMMAND RELAY</span>
                </div>
            </div>
            <div class="hdr-right">
                <div class="hdr-status">
                    <span class="status-dot"></span>
                    <span class="status-text">ONLINE</span>
                </div>
                <button class="btn-metrics" onclick="toggleDrawer()">
                    <span class="btn-metrics-icon">◈</span>
                    METRICS
                </button>
            </div>
        </header>

        <!-- ═══ MAIN ═══ -->
        <div class="main">

            <!-- SIDEBAR -->
            <aside class="sidebar">
                <div class="sidebar-hdr">
                    <span class="sidebar-hdr-label">CHANNELS</span>
                    <span class="sidebar-hdr-count" id="channel-count">0</span>
                </div>
                <div id="channel-list" class="channel-list"></div>
                <div class="sidebar-ftr">作戦室</div>
            </aside>

            <!-- CHAT -->
            <section class="chat">
                <div class="chat-bar">
                    <div class="chat-bar-channel">
                        <span class="chat-bar-hash">#</span>
                        <span id="chat-channel-name" class="chat-bar-name">——</span>
                    </div>
                    <div class="chat-bar-right">
                        <span class="chat-bar-label">SESSION</span>
                        <span id="chat-uptime" class="chat-bar-timer">00:00</span>
                    </div>
                </div>

                <div id="chat-feed" class="feed">
                    <div class="feed-empty">
                        <div class="feed-empty-num">無</div>
                        <div class="feed-empty-txt">AWAITING SIGNAL</div>
                    </div>
                </div>

                <div class="input-bar">
                    <span class="input-bar-prefix">▶</span>
                    <input id="msg-input" class="input-field" type="text"
                           placeholder="TRANSMIT MESSAGE..." autocomplete="off"/>
                    <button id="send-btn" class="send-btn">
                        <span class="send-jp">送信</span>
                    </button>
                </div>
            </section>

        </div>
    </div>

    <!-- ═══ METRICS PANEL ═══ -->
    <div class="metrics-overlay" id="stats-drawer">
        <div class="metrics-backdrop" onclick="toggleDrawer()"></div>
        <div class="metrics-panel">
            <div class="mp-hdr">
                <div class="mp-title">
                    <span class="mp-title-jp">戦力</span>
                    <span class="mp-title-en">BATTLE METRICS</span>
                </div>
                <button class="mp-close" onclick="toggleDrawer()">✕</button>
            </div>
            <div class="mp-body">

                <div class="mg mg--atk">
                    <div class="mg-label">
                        <span class="mg-tag mg-tag--atk">ATK</span>
                        <span class="mg-name">OFFENSIVE</span>
                    </div>
                    <div class="mg-row"><label>SHT</label><input type="number" id="sht" placeholder="0"></div>
                    <div class="mg-row"><label>DBL</label><input type="number" id="dbl" placeholder="0"></div>
                    <div class="mg-row"><label>STL</label><input type="number" id="stl" placeholder="0"></div>
                    <div class="mg-row"><label>PSN</label><input type="number" id="psn" placeholder="0"></div>
                    <div class="mg-row"><label>DFD</label><input type="number" id="dfd" placeholder="0"></div>
                </div>

                <div class="mg mg--gk">
                    <div class="mg-label">
                        <span class="mg-tag mg-tag--gk">GK</span>
                        <span class="mg-name">GOALKEEP</span>
                    </div>
                    <div class="mg-row"><label>DVG</label><input type="number" id="dvg" placeholder="—"></div>
                    <div class="mg-row"><label>BIQ</label><input type="number" id="biq" placeholder="—"></div>
                    <div class="mg-row"><label>RFX</label><input type="number" id="rfx" placeholder="—"></div>
                    <div class="mg-row"><label>DTG</label><input type="number" id="dtg" placeholder="—"></div>
                </div>

            </div>
            <button id="ui-stats-btn" class="mp-submit" onclick="generateStats()">
                <span class="mp-submit-jp">解析</span>
                <span class="mp-submit-en">GENERATE STATS</span>
            </button>
        </div>
    </div>

    <!-- ═══ STATS MODAL ═══ -->
    <div id="stats-modal" class="stats-overlay">
        <div class="stats-panel">
            <div class="stats-hdr">
                <span class="stats-title">STATS SEAL // 印</span>
                <button id="close-modal" class="stats-close">✕</button>
            </div>
            <canvas id="stats-canvas" width="500" height="500"></canvas>
            <div class="stats-actions">
                <button id="copy-stats-btn" class="stats-btn">COPY IMAGE</button>
                <button id="copy-rank-btn" class="stats-btn stats-btn--hi">COPY RANK</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
        function toggleDrawer() {
            document.getElementById('stats-drawer').classList.toggle('active');
        }
    </script>
</body>
</html>
